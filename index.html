<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PDF Flipbook — Debug Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin:0; font-family:system-ui,Segoe UI,Roboto,Arial; background:#111; color:#fff; }
    .toolbar { padding:10px; display:flex; gap:8px; background:#141414; align-items:center; }
    button{padding:6px 10px;border-radius:6px;background:#222;color:#fff;border:1px solid #333;cursor:pointer}
    #bookWrapper{display:flex;align-items:center;justify-content:center;height:calc(100vh - 52px);overflow:auto}
    .flipbook{ background:transparent }
    .page{ background:#fff; box-shadow:0 8px 30px rgba(0,0,0,0.6); display:flex;align-items:center;justify-content:center; overflow:hidden }
    #debug{position:fixed;right:12px;bottom:12px;background:rgba(0,0,0,0.6);padding:8px 10px;border-radius:8px;font-size:13px;max-width:320px}
    #errorBox{background:#2b0a0a;color:#ffb3b3;padding:8px;border-radius:6px;margin-left:12px;display:none}
  </style>
  <!-- jQuery (required by turn.js) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <!-- turn.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
</head>
<body>
  <div class="toolbar">
    <button id="prevBtn">◀ Prev</button>
    <button id="nextBtn">Next ▶</button>
    <span style="flex:1"></span>
    <button id="zoomOut">-</button>
    <button id="zoomIn">+</button>
    <button id="fitBtn">Fit</button>
    <button id="fsBtn">Full</button>
    <div id="errorBox"></div>
  </div>

  <div id="bookWrapper">
    <div id="flipbook" class="flipbook"></div>
  </div>

  <div id="debug">Status: <span id="status">idle</span></div>

  <script src="app_debug.js"></script>
</body>
</html>
